<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For Mehal</title>
    <style>
        body {
            background-color: #f7cac9;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            font-family: 'Arial', sans-serif;
            color: #333;
            overflow: hidden;
        }
        h1 {
            font-size: 3rem;
            margin-bottom: 20px;
            text-align: center;
        }
        .btn-container {
            display: flex;
            gap: 20px;
            position: relative;
            height: 100px;
            align-items: center;
        }
        .btn {
            padding: 15px 30px;
            font-size: 1.2rem;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .yes-btn {
            background-color: #ff4757;
            color: white;
        }
        .no-btn {
            background-color: #ced6e0;
            color: #333;
            position: absolute;
        }
        .btn:hover {
            transform: scale(1.1);
        }
    </style>
</head>
<body>

    <h1>Will you stay with me forever Mehal? 🥺</h1>
    <div class="btn-container">
        <button class="btn yes-btn" onclick="alert('I knew you would say yes! ❤️')">Yes</button>
        <button class="btn no-btn" id="noBtn">No</button>
    </div>

    <script>
        const noBtn = document.getElementById('noBtn');

        noBtn.addEventListener('mouseover', function() {
            const x = Math.random() * (window.innerWidth - noBtn.offsetWidth);
            const y = Math.random() * (window.innerHeight - noBtn.offsetHeight);
            noBtn.style.left = `${x}px`;
            noBtn.style.top = `${y}px`;
        });

        noBtn.addEventListener('click', function() {
            alert('Nice try!');
        });
    </script>

</body>
</html>
