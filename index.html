<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Mehal</title>
<style>
  body {
    background-color: #f7cac9;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    margin: 0;
    font-family: 'Arial', sans-serif;
    color: #333;
  }
  h1 {
    font-size: 3rem;
    margin-bottom: 20px;
    text-align: center;
  }
  .btn-container {
    display: flex;
    gap: 20px;
  }
  .btn {
    padding: 15px 30px;
    font-size: 1.2rem;
    border: none;
    border-radius: 5px;
    cursor: pointer;
    transition: transform 0.2s;
  }
  .yes-btn {
    background-color: #ff4757;
    color: white;
  }
  .no-btn {
    background-color: #ced6e0;
    color: #333;
  }
  .btn:hover {
    transform: scale(1.1);
  }
</style>
</head>
<body>

  <h1>Will you stay with me foreverr 🥺 Mehal?</h1>
  <div class="btn-container">
    <button class="btn yes-btn" onclick="alert('I knew you would say yes! ❤️')">Yes</button>
    <button class="btn no-btn" onclick="alert('Oh no! Are you sure?')">No</button>
  </div>

</body>
</html>
