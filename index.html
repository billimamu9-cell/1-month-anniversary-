        }

        .btn {
            padding: 15px 30px;

            border: none;

        .yes-btn {
            background-color: #ff4757;

        }

        .no-btn {
            background-color: #ced6e0;
            color: #333;
            position: absolute;
        }

        .btn:hover {
            transform: scale(1.1);
        }

        .love-message {
            font-size: 1.8rem;
            color: #ff4757;
            line-height: 1.6;
            padding: 20px;
            display: none;
            animation: fadeIn 1s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }
    </style>
