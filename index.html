<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anniversary</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
            margin: 0;
        }
        button {
            margin: 10px;
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
        }
        #noButton {
            background-color: red;
            color: white;
        }
    </style>
</head>
<body>
    <h1>Will you be mine forever?</h1>
    <button id="yesButton">Yes</button>
    <button id="noButton">No</button>

    <script>
        document.getElementById('yesButton').addEventListener('click', function() {
            document.body.innerHTML = '<h1>Happy Anniversary! I love you, my jaan! Happy 1-Month Anniversary! 🎉<br>
        you keep my worldd soo much brighter<br>
        I hope we stayyy togetherrr</h1>';
        });

        document.getElementById('noButton').addEventListener('mouseenter', function() {
            window.scrollTo({ top: window.innerHeight, behavior: 'smooth' });
        });
    </script>
</body>
</html>
