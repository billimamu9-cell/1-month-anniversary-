<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For Mehal</title>
    <style>
        body {
            background-color: #f7cac9;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            font-family: 'Arial', sans-serif;
            color: #333;
            overflow: hidden;
            text-align: center;
        }
        h1 {
            font-size: 2.5rem;
            margin-bottom: 30px;
            padding: 0 20px;
        }
        .btn-container {
            display: flex;
            gap: 20px;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 80px;
            position: relative;
        }
        .btn {
            padding: 15px 30px;
            font-size: 1.2rem;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: transform 0.1s;
        }
        .yes-btn {
            background-color: #ff4757;
            color: white;
            z-index: 10;
        }
        .no-btn {
            background-color: #ced6e0;
            color: #333;
             position: absolute;
top: 50%;
left: 50%;
transform: translate(-50%, -50%);
;
        }
        .btn:hover {
            transform: scale(1.1);
        }
        .love-message {
            font-size: 1.8rem;
            color: #ff4757;
            line-height: 1.6;
            padding: 20px;
            display: none;
            animation: fadeIn 1s ease-in-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div id="quiz-section">
        <h1>Will you stay with me forever Mehal? 🥺</h1>
        <div class="btn-container">
            <button class="btn yes-btn" id="yesBtn">Yes</button>
            <button class="btn no-btn" id="noBtn">No</button>
        </div>
    </div>

    <div id="loveSection" class="love-message">
        <h2>Thank you so much. Mehal, I knew it you would say yes! ❤️</h2>
        <p>You make my world so much brighter. ✨</p>
        <p>Cheers to our 1-month anniversary and many more to come! 🥂💕</p>
    </div>

    <script>
        const noBtn = document.getElementById('noBtn');
        const yesBtn = document.getElementById('yesBtn');
        const quizSection = document.getElementById('quiz-section');
        const loveSection = document.getElementById('loveSection');

        function moveButton() {
            const btnWidth = noBtn.offsetWidth;
            const btnHeight = noBtn.offsetHeight;
            const maxX = window.innerWidth - btnWidth - 20;
            const maxY = window.innerHeight - btnHeight - 20;
            const randomX = Math.max(10, Math.floor(Math.random() * maxX));
            const randomY = Math.max(10, Math.floor(Math.random() * maxY));
            noBtn.style.left = randomX + 'px';
            noBtn.style.top = randomY + 'px';
        }

        noBtn.addEventListener('mouseover', moveButton);
        noBtn.addEventListener('touchstart', (e) => {
            e.preventDefault();
            moveButton();
        });

        yesBtn.addEventListener('click', () => {
            quizSection.style.display = 'none';
            loveSection.style.display = 'block';
        });
    </script>
</body>
</html>
